name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v3

      # ✅ Use stable Node version (VERY IMPORTANT)
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ✅ Install dependencies CLEANLY
      - name: Install dependencies
        run: |
          cd chapapp-frontend
          rm -rf node_modules package-lock.json
          npm install

      # ✅ Fix permission issue explicitly (Linux fix)
      - name: Fix react-scripts permission
        run: chmod +x chapapp-frontend/node_modules/.bin/react-scripts

      # ✅ Build app manually (avoid Oryx issues)
      - name: Build app
        run: |
          cd chapapp-frontend
          npm run build

      # ✅ Deploy WITHOUT rebuilding
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_RIVER_0C4F5D71E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "chapapp-frontend"
          output_location: "build"
          skip_app_build: true   # 🚀 IMPORTANT (we already built)

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_RIVER_0C4F5D71E }}
          action: "close"